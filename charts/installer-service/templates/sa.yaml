kind: ServiceAccount
apiVersion: v1
metadata:
  name: installer-service
  namespace: openfuyao-system
  labels:
    app.kubernetes.io/name: installer-service
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: installer-service
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["bke.bocloud.com"]
    resources: ["bkeclusters"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: installer-service
subjects:
  - kind: ServiceAccount
    name: installer-service
    namespace: openfuyao-system
roleRef:
  kind: ClusterRole
  name: installer-service
  apiGroup: rbac.authorization.k8s.io
---